<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chatbot Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Sidebar backdrop (mobile) -->
        <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">✦</div>
                    <span class="logo-text">AI Chat</span>
                </div>
                <button id="new-chat-btn" class="new-chat-btn" title="New Chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"/></svg>
                    <span>New Chat</span>
                </button>
            </div>
            <div class="sidebar-search">
                <input type="text" id="search-conversations" placeholder="Search conversations..." />
            </div>
            <div id="conversation-list" class="conversation-list">
                <div class="loading-conversations"><div class="spinner"></div><span>Loading...</span></div>
            </div>
            <div class="sidebar-footer">
                <div class="model-selector">
                    <label>Model:</label>
                    <select id="model-select">
                        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                    </select>
                </div>
                <div class="footer-info">
                    <span>Powered by Google Gemini ✦</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="main-content" class="main-content">
            <!-- Mobile header -->
            <div class="mobile-header">
                <button id="mobile-menu-btn" class="mobile-menu-btn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <div class="logo-text">AI Chat</div>
                <div style="margin-left:auto;display:flex;gap:4px;">
                    <button id="theme-btn-mobile" class="icon-btn" title="Toggle theme">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                    </button>
                </div>
            </div>

            <!-- Top bar (profile/settings) -->
            <div class="top-bar" id="top-bar">
                <button id="profile-btn" class="icon-btn" title="Profile">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
                <button id="settings-btn" class="icon-btn" title="Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
                <button id="theme-btn" class="icon-btn" title="Toggle theme">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                </button>
                <button id="logout-btn" class="icon-btn" title="Logout" style="color:var(--danger)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                </button>
            </div>

            <!-- Drag-and-drop zone -->
            <div id="drag-zone" class="drag-zone">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                <span>Drop files here to attach</span>
            </div>

            <!-- Chat container -->
            <div id="chat-container" class="chat-container">
                <!-- Welcome screen -->
                <div id="welcome-screen" class="welcome-screen">
                    <div class="welcome-icon">✦</div>
                    <h1 class="welcome-title">How can I help you today?</h1>
                    <p class="welcome-subtitle">AI-powered by Google Gemini</p>
                    <div class="suggestion-chips">
                        <button class="suggestion-chip" data-prompt="Explain quantum computing in simple terms"><span class="chip-icon">⚛️</span><span>Quantum computing</span></button>
                        <button class="suggestion-chip" data-prompt="Write a Python function to sort a list of dictionaries"><span class="chip-icon">🐍</span><span>Python code</span></button>
                        <button class="suggestion-chip" data-prompt="What are REST API best practices?"><span class="chip-icon">🔧</span><span>REST API</span></button>
                        <button class="suggestion-chip" data-prompt="Compare machine learning vs deep learning"><span class="chip-icon">🤖</span><span>ML vs DL</span></button>
                        <button class="suggestion-chip" data-prompt="Write a creative story about AI"><span class="chip-icon">📝</span><span>Creative story</span></button>
                        <button class="suggestion-chip" data-prompt="Explain HTTP vs HTTPS"><span class="chip-icon">🌐</span><span>HTTP vs HTTPS</span></button>
                    </div>
                </div>

                <!-- Messages -->
                <div id="messages-area" class="messages-area" style="display:none">
                    <div id="messages-container" class="messages-container"></div>
                </div>
            </div>

            <!-- Input area -->
            <div id="input-area" class="input-area">
                <div class="input-wrapper">
                    <div class="input-container">
                        <div class="input-actions-left">
                            <button id="emoji-btn" class="icon-btn" title="Emoji">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                            </button>
                            <button id="attach-btn" class="icon-btn" title="Attach file">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                            </button>
                        </div>
                        <textarea id="message-input" class="message-input" placeholder="Send a message..." rows="1" autofocus></textarea>
                        <div class="input-actions">
                            <button id="send-btn" class="send-btn" disabled title="Send">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Emoji picker -->
                <div id="emoji-picker" class="emoji-picker">
                    <div class="emoji-grid" id="emoji-grid"></div>
                </div>

                <!-- Hidden file input -->
                <input type="file" id="file-input" style="display:none" accept=".txt,.pdf,.png,.jpg,.jpeg,.gif,.py,.js,.html,.css,.json,.csv,.md">

                <p class="input-footer">AI responses are generated by Google Gemini. Verify important information.</p>
            </div>

            <!-- Stop button -->
            <div id="stop-btn-container" class="stop-btn-container" style="display:none">
                <button id="stop-btn" class="stop-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                    Stop Generating
                </button>
            </div>
        </main>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal-overlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal('profile-modal')">&times;</button>
            <h2>Profile</h2>
            <img id="modal-avatar" class="modal-avatar-preview" src="" alt="avatar">
            <div class="modal-group">
                <label>Avatar</label>
                <input type="file" id="avatar-input" accept="image/*">
            </div>
            <div class="modal-group">
                <label>Username</label>
                <input type="text" id="profile-username" placeholder="Username">
            </div>
            <div class="modal-group">
                <label>Email</label>
                <input type="email" id="profile-email" disabled style="opacity:0.6">
            </div>
            <div class="modal-group">
                <label>New Password (leave blank to keep)</label>
                <input type="password" id="profile-password" placeholder="New password">
            </div>
            <div class="modal-group">
                <label>Theme</label>
                <select id="profile-theme">
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>
            </div>
            <button class="modal-btn" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal('settings-modal')">&times;</button>
            <h2>Settings</h2>
            <div class="modal-group">
                <label>Default Model</label>
                <select id="settings-model">
                    <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                    <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                </select>
            </div>
            <div class="modal-group">
                <label>Temperature</label>
                <input type="range" id="settings-temp" min="0" max="1" step="0.1" value="0.7">
                <span id="settings-temp-val" style="font-size:13px;color:var(--text-muted)">0.7</span>
            </div>
            <div class="modal-group">
                <label>Max Output Tokens</label>
                <select id="settings-tokens">
                    <option value="2048">2,048</option>
                    <option value="4096">4,096</option>
                    <option value="8192" selected>8,192</option>
                    <option value="16384">16,384</option>
                </select>
            </div>
            <button class="modal-btn" onclick="saveSettings()">Save Settings</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.4/purify.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
