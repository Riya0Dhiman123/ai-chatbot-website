<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding:20px;
        }
        .auth-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border:1px solid rgba(255,255,255,0.1); border-radius:24px; padding:40px;
            width:100%; max-width:420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .auth-logo { text-align:center; margin-bottom:28px; }
        .auth-logo span { font-size:40px; }
        .auth-logo h1 {
            font-size:24px; font-weight:700;
            background: linear-gradient(135deg, #a78bfa, #c4b5fd);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            margin-top:8px;
        }
        .auth-title { color:#ececec; font-size:20px; font-weight:600; text-align:center; margin-bottom:8px; }
        .auth-subtitle { color:#9ca3af; font-size:14px; text-align:center; margin-bottom:28px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; color:#d1d5db; font-size:13px; font-weight:500; margin-bottom:6px; }
        .form-group input {
            width:100%; padding:12px 16px;
            background: rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.12); border-radius:12px;
            color:#ececec; font-size:14px; font-family:inherit;
            outline:none; transition:border-color 0.2s;
        }
        .form-group input:focus { border-color:#a78bfa; }
        .form-group input::placeholder { color:#6b7280; }
        .auth-btn {
            width:100%; padding:12px;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            border:none; border-radius:12px;
            color:#fff; font-size:15px; font-weight:600; font-family:inherit;
            cursor:pointer; transition:transform 0.2s, box-shadow 0.2s;
        }
        .auth-btn:hover { transform:translateY(-1px); box-shadow:0 8px 25px rgba(124,58,237,0.35); }
        .auth-error {
            background: rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3);
            color:#fca5a5; font-size:13px; padding:10px 14px;
            border-radius:10px; margin-bottom:16px; text-align:center; display:none;
        }
        .auth-footer { text-align:center; margin-top:20px; color:#9ca3af; font-size:13px; }
        .auth-footer a { color:#a78bfa; text-decoration:none; font-weight:500; }
        .auth-footer a:hover { text-decoration:underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <span>✦</span>
            <h1>AI Chat</h1>
        </div>
        <div class="auth-title">Create account</div>
        <div class="auth-subtitle">Start your AI journey</div>
        <div class="auth-error" id="error-msg"></div>
        <form id="register-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required minlength="4">
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login_page') }}">Sign in</a>
        </div>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button');
            const errEl = document.getElementById('error-msg');
            const data = { username: form.username.value, email: form.email.value, password: form.password.value };
            btn.disabled = true; btn.textContent = 'Creating...';
            try {
                const res = await fetch('/register', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(data)
                });
                const json = await res.json();
                if (json.ok) { window.location.href = json.redirect; }
                else {
                    errEl.style.display = 'block';
                    errEl.textContent = json.error || 'Registration failed';
                    btn.disabled = false; btn.textContent = 'Create Account';
                }
            } catch(e) {
                errEl.style.display = 'block'; errEl.textContent = 'Connection error';
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
